<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎯 Career AI Job Assistant</title>
</head>
<body>
    <h1>🎯 Career AI Job Assistant</h1>

    <form method="post" enctype="multipart/form-data">
        <h3>Upload Resume (PDF/DOCX)</h3>
        <input type="file" name="resume_file"><br><br>

        <h3>Paste Resume Text (Optional)</h3>
        <textarea name="resume" rows="8" cols="80">{{ resume }}</textarea><br><br>

        <h3>Upload Job Description (PDF/DOCX)</h3>
        <input type="file" name="jd_file"><br><br>

        <h3>Or Scrape JD from URL</h3>
        <input type="url" name="jd_url" placeholder="Paste Job URL"><br><br>

        <h3>Paste Job Description (Optional)</h3>
        <textarea name="jd" rows="8" cols="80">{{ jd }}</textarea><br><br>

        <input type="text" name="role" value="{{ role }}" placeholder="Role">
        <input type="text" name="company" value="{{ company }}" placeholder="Company"><br><br>

        <button name="action" value="tailor">🛠️ Tailor Resume</button>
        <button name="action" value="cover_letter">✉️ Generate Cover Letter</button>
        <button name="action" value="match">📈 Match Resume</button>
        <button name="action" value="questions">🧠 Generate Questions</button>
    </form>

    <h2>Result:</h2>
    <pre>{{ result }}</pre>

    <hr>
    <a href="/vault">📁 Resume Vault</a> |
    <a href="/preferences">⚙️ Preferences</a> |
    <a href="/jobs">📄 Jobs</a> |
    <a href="/logout">🚪 Logout</a>
</body>
</html>
