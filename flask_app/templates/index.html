<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Career AI Job Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="text-center mb-4"><span>🎯</span> <strong>Career AI Job Assistant</strong></h2>

        <form method="POST" enctype="multipart/form-data">
          <div class="row g-4">

            <div class="col-md-6">
              <label for="resume_file" class="form-label">Upload Resume (PDF/DOCX)</label>
              <input type="file" class="form-control" name="resume_file" id="resume_file">
            </div>

            <div class="col-md-6">
              <label for="jd_file" class="form-label">Upload Job Description (PDF/DOCX)</label>
              <input type="file" class="form-control" name="jd_file" id="jd_file">
            </div>

            <div class="col-md-6">
              <label for="resume" class="form-label">Paste Resume Text (Optional)</label>
              <textarea class="form-control" name="resume" id="resume" rows="6">{{ resume }}</textarea>
            </div>

            <div class="col-md-6">
              <label for="jd" class="form-label">Paste Job Description (Optional)</label>
              <textarea class="form-control" name="jd" id="jd" rows="6">{{ jd }}</textarea>
            </div>

            <div class="col-12">
              <label for="jd_url" class="form-label">Or Scrape JD from URL</label>
              <input type="text" class="form-control" name="jd_url" placeholder="Paste Job URL">
            </div>

            <div class="col-md-6">
              <label for="role" class="form-label">Role Title</label>
              <input type="text" class="form-control" name="role" placeholder="e.g. AI Engineer" value="{{ role }}">
            </div>

            <div class="col-md-6">
              <label for="company" class="form-label">Company Name</label>
              <input type="text" class="form-control" name="company" placeholder="e.g. OpenAI" value="{{ company }}">
            </div>

            <div class="col-12 d-flex justify-content-between flex-wrap gap-2 mt-3">
              <button class="btn btn-primary" name="action" value="tailor">Tailor Resume</button>
              <button class="btn btn-success" name="action" value="cover_letter">Generate Cover Letter</button>
              <button class="btn btn-warning" name="action" value="match">Get Match Score</button>
              <button class="btn btn-info text-white" name="action" value="questions">Generate Interview Qs</button>
            </div>

            {% if result %}
            <div class="col-12 mt-4">
              <label class="form-label"><strong>Result:</strong></label>
              <textarea class="form-control bg-light" rows="10" readonly>{{ result }}</textarea>
            </div>
            {% endif %}

          </div>
        </form>

      </div>
    </div>
  </div>

</body>
</html>
