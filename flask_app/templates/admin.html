<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🔐 Admin Dashboard</title>
</head>
<body>
    <h1>🔐 Admin Panel</h1>

    <h3>Registered Users</h3>
    <table border="1">
        <tr>
            <th>User ID</th>
            <th>Email</th>
            <th>Role Preference</th>
            <th>Location Preference</th>
        </tr>
        {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role_preference or 'N/A' }}</td>
                <td>{{ user.location_preference or 'N/A' }}</td>
            </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/">⬅️ Back to Home</a>
</body>
</html>
