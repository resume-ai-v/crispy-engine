<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📁 Resume Vault</title>
</head>
<body>

<h1>📁 Resume Vault (Temporary)</h1>

{% for f in files %}
  <div class="card my-2 p-2">
    <b>{{ f.name }}</b><br>
    🕒 {{ f.modified }}
    <a class="btn btn-sm btn-primary" href="/download/{{ f.name }}">Download</a>
    <a class="btn btn-sm btn-danger" href="/delete/{{ f.name }}">Delete</a>
  </div>
{% endfor %}

{% else %}
    <p>No files available.</p>
{% endif %}

<br><br>
<a href="/cleanup">🧹 Cleanup Expired Files</a> | <a href="/">🏠 Home</a>

</body>
</html>
